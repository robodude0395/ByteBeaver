# LLM Server Configuration
llm:
  provider: "openai_compatible"  # openai_compatible, anthropic, ollama
  base_url: "http://localhost:8001/v1"
  model: "qwen2.5-coder-14b-instruct"
  max_tokens: 2048
  temperature: 0.2
  context_window: 8192
  api_key: ""  # Required for anthropic provider

# Agent Server Configuration
agent:
  host: "0.0.0.0"
  port: 8000
  log_level: "INFO"
  log_file: "logs/agent.log"
  max_log_size_mb: 100

# Tool Configuration
tools:
  terminal:
    enabled: true
    timeout: 60
    allowed_commands:
      - "npm"
      - "pip"
      - "pytest"
      - "jest"
      - "cargo"
      - "go"
      - "make"
  filesystem:
    max_file_size_mb: 10
